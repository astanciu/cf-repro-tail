name: "owlie-local"
services:
  db:
    image: postgres:18
    restart: always
    ports:
      - 5432:5432
    command: >
      postgres
      -c log_destination=stderr
      -c log_statement=all
      -c client_min_messages=log
      -c log_line_prefix=''
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db
